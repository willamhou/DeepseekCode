# DeepseekCode 示例配置
#
# 用法：
#   1. 复制此文件为 `.dscode/config.toml`
#         cp .dscode/config.example.toml .dscode/config.toml
#   2. 设置环境变量
#         export DEEPSEEK_API_KEY=sk-...
#   3. 用 `dscode doctor` 验证配置生效
#         dscode doctor
#   4. 用 `dscode smoke` 验证远端可达
#         dscode smoke                    # OpenAI-compatible 路径
#         dscode smoke --flavor anthropic # Anthropic-compatible 路径
#
# 当前 v0.1 解析器是行级 key=value，不支持嵌套表头（如 [model]）。
# 字符串值可加双引号也可不加，注释以 # 开头。

# -----------------------------------------------------------------------------
# model: DeepSeek 远端调用
# -----------------------------------------------------------------------------

# DeepSeek API base url
# - OpenAI-compatible（默认，推荐）：调用 /chat/completions，使用正式 tool use
# - Anthropic-compatible：以 /anthropic 结尾，调用 /messages（v0.1 走 JSON plan 回退）
model.base_url = "https://api.deepseek.com"
# model.base_url = "https://api.deepseek.com/anthropic"

# DeepSeek 模型名
# 常见值：deepseek-coder、deepseek-chat
model.model = "deepseek-coder"

# 读取 API key 的环境变量名
# 仅指定变量名，不要把 key 本身写到这里
model.api_key_env = "DEEPSEEK_API_KEY"

# -----------------------------------------------------------------------------
# approval: 写入、shell 命令与 agent MCP 调用的审批策略
# -----------------------------------------------------------------------------

# 应用 patch 写入文件前是否要求确认
# 用环境变量 DSCODE_AUTO_APPROVE_WRITES=1 可一次性放行
approval.require_write_confirmation = true

# 执行 run_shell 前是否要求确认
# 用环境变量 DSCODE_AUTO_APPROVE_SHELL=1 可一次性放行
approval.require_shell_confirmation = true

# agent 通过 mcp_call 调用远端 MCP tool 前是否要求确认
# 用环境变量 DSCODE_AUTO_APPROVE_MCP=1 可一次性放行
# 用户显式执行 `deepseek mcp call ...` 不走此审批，因为那已经是直接命令意图。
approval.require_mcp_confirmation = true

# 可选：限制 agent 允许调用哪些 MCP server/tool；空数组表示不限制，仍会走上面的确认。
# 支持精确 server/tool、server/*、*/tool、*/*。
approval.mcp_call_allowlist = []

# -----------------------------------------------------------------------------
# workspace: 配置与会话目录
# -----------------------------------------------------------------------------

# 配置目录（相对于当前仓库根）
# 默认 .dscode，包含 config.toml 与 sessions 子目录
workspace.config_dir = ".dscode"

# 会话快照目录
# `dscode resume` 会从此目录读取上次会话
workspace.session_dir = ".dscode/sessions"

# 用户级自定义 slash command 目录
# 项目级命令放在 `.dscode/commands/*.md`
workspace.user_commands_dir = "~/.config/dscode/commands"

# 用户级长期指令文件；留空可禁用用户级指令
# 项目级指令从 git root 到当前目录依次读取：AGENTS.override.md、AGENTS.md、CLAUDE.md
workspace.user_instructions_file = "~/.config/dscode/AGENTS.md"

# -----------------------------------------------------------------------------
# hooks: optional local extension points
# -----------------------------------------------------------------------------

# Disabled by default so cloned repositories cannot execute hook scripts implicitly.
hooks.enabled = false

# Hook scripts live under <dir>/<event>/* and must be executable.
# Supported events: user_prompt_submit, pre_tool_use, post_tool_use.
hooks.project_dir = ".dscode/hooks"
hooks.user_dir = "~/.config/dscode/hooks"
hooks.timeout_ms = 5000

# -----------------------------------------------------------------------------
# mcp: MCP server discovery (config validation/listing + stdio/http/sse tools/list/call)
# -----------------------------------------------------------------------------

# 当前版本会读取并校验 MCP server 配置，可手动对 stdio、HTTP 或 SSE server 执行 tools/list / tools/call。
# 当 project/user MCP config 文件存在时，agent registry 会暴露通用 mcp_list_tools / mcp_call bridge。
# agent bridge 的 mcp_call 默认受 approval.require_mcp_confirmation 和 approval.mcp_call_allowlist 保护。
# 设置 mcp.expose_remote_tools = true 后，会把发现到的远端 MCP tools 以 mcp__server__tool 形式注入为独立 agent tool。
# Project/user scope 的同名 server 以 project 为准。
mcp.enabled = true
mcp.expose_remote_tools = false
mcp.project_file = ".dscode/mcp.json"
mcp.user_file = "~/.config/dscode/mcp.json"

